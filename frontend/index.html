<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🛒 AI Store</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html">Cart <span id="cart-count" class="badge bg-danger">0</span></a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">Orders</a></li>
                    <li class="nav-item"><a class="nav-link" href="chat.html">AI Assistant</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html" id="login-link">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="container">
        <div class="hero-section text-center">
            <h1 class="display-4">Welcome to AI Store</h1>
            <p class="lead">Shop smarter with our AI-powered shopping assistant!</p>
            <a href="products.html" class="btn btn-light btn-lg mt-3">Browse Products</a>
            <a href="chat.html" class="btn btn-outline-light btn-lg mt-3 ms-2">
                <i class="bi bi-robot"></i> Try AI Assistant
            </a>
        </div>

    <div class="container mt-5">
        <h2 class="text-center mb-4">Featured Products</h2>
        <div class="row" id="featured-products">

        </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p class="mb-0">&copy; 2026 AI Store. Built with ❤️ and Groq AI</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/products.js"></script>
    <!-- Floating AI Chat Widget -->
<div id="ai-chat-widget-container">
    <script src="js/widget-chat.js"></script>
    <link rel="stylesheet" href="css/widget-chat.css">
