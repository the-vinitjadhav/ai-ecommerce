<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - AI Ecommerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css?v=4">
    <link rel="stylesheet" href="/css/widget-chat.css?v=12">
    <script src="/js/widget-chat.js?v=12"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top glass-nav">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="index.html">
                <span style="color: #667eea;">✨ AI</span> Store
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="chat.html">AI Assistant</a></li>
                    
                    <li class="nav-item ms-2">
                        <a class="nav-link" href="cart.html">
                            🛒 Cart <span id="cart-count" class="badge rounded-pill bg-danger ms-1">0</span>
                        </a>
                    </li>
                    
                    <li class="nav-item"><a class="nav-link" href="profile.html" id="profile-link" style="display:none;">👤 Profile</a></li>
                    
                    <li class="nav-item">
                        <a class="nav-link text-warning fw-bold" href="admin.html" id="admin-link" style="display:none;">
                            ⚙️ Admin
                        </a>
                    </li>
                    
                    <li class="nav-item ms-3">
                        <a class="btn btn-outline-light btn-sm px-4 rounded-pill" href="login.html" id="login-link">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div style="height: 80px;"></div>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-5 mb-4">
                <img id="detail-img" src="" class="img-fluid rounded shadow-sm w-100" style="object-fit: cover; height: 400px;" alt="Product Image">
            </div>
            <div class="col-md-7">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="products.html">Products</a></li>
                        <li class="breadcrumb-item active" aria-current="page" id="detail-category">...</li>
                    </ol>
                </nav>
                <h2 id="detail-title" class="fw-bold">Loading...</h2>
                
                <div class="d-flex align-items-center mb-3 mt-2">
                    <h3 class="price mb-0 me-3" id="detail-price"></h3>
                    <span id="detail-stock" class="badge"></span>
                </div>
                
                <p class="text-muted mt-4" id="detail-desc" style="line-height: 1.8; font-size: 1.1rem;"></p>
                
                <div class="d-flex gap-3 mt-5 align-items-center">
                    <label for="detail-qty" class="fw-bold">Quantity:</label>
                    <input type="number" id="detail-qty" class="form-control text-center" value="1" min="1" style="width: 80px; font-weight: bold;">
                    <button class="btn btn-primary btn-lg px-4" id="detail-add-btn">
                        <i class="bi bi-cart-plus"></i> Add to Cart
                    </button>
                </div>
            </div>
        </div>

        <div class="mt-5 pt-5 border-top">
            <h3 class="mb-4">You Might Also Like</h3>
            <div class="row" id="related-products-container">
                </div>
        </div>
    </div>

    <div id="ai-chat-widget-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/product-detail.js"></script> <div id="ai-chat-widget-container">
        <script src="js/widget-chat.js"></script>
        <link rel="stylesheet" href="css/widget-chat.css">
    </div>
</body>
</html>
