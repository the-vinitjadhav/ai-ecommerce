<!-- Floating AI Chat Widget -->
<div id="ai-chat-widget" style="display:none; position:fixed; bottom:20px; right:20px; z-index:9999; font-family: 'Segoe UI', sans-serif;">
    
    <!-- Chat Toggle Button -->
    <button id="chat-toggle" style="width:60px; height:60px; border-radius:50%; border:none; 
        background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:white; font-size:28px; 
        cursor:pointer; box-shadow:0 4px 15px rgba(102,126,234,0.4); transition:transform 0.2s;">
        🤖
    </button>

    <!-- Chat Popup Window -->
    <div id="chat-popup" style="display:none; position:fixed; bottom:90px; right:20px; width:380px; 
        height:500px; background:white; border-radius:20px; box-shadow:0 10px 40px rgba(0,0,0,0.2); 
        overflow:hidden; display:flex; flex-direction:column; animation:slideUp 0.3s ease;">
        
        <!-- Chat Header -->
        <div style="background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:white; padding:15px 20px; 
            display:flex; justify-content:space-between; align-items:center;">
            <div>
                <span style="font-weight:600; font-size:1.1rem;">🤖 AI Assistant</span>
                <br><small style="opacity:0.8;">Online • Powered by Groq</small>
            </div>
            <button id="chat-close" style="background:none; border:none; color:white; font-size:22px; cursor:pointer;">✕</button>
        </div>

        <!-- Chat Messages -->
        <div id="widget-chat-messages" style="flex:1; padding:15px; overflow-y:auto; background:#f8f9fa;">
            <div style="text-align:center; color:#888; font-size:0.9rem; padding:20px;">
                👋 Ask me anything about products, prices, or orders!
            </div>
        </div>

        <!-- Chat Input -->
        <div style="padding:15px; background:white; border-top:1px solid #eee; display:flex; gap:10px;">
            <input id="widget-chat-input" type="text" placeholder="Ask about products..." 
                style="flex:1; border:2px solid #eee; border-radius:25px; padding:10px 15px; font-size:0.95rem; outline:none;">
            <button id="widget-chat-send" style="border:none; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
                color:white; padding:10px 20px; border-radius:25px; cursor:pointer; font-weight:600;">
                Send
            </button>
        </div>
    </div>
</div>

<style>
    @keyframes slideUp {
        from { opacity:0; transform:translateY(20px); }
        to { opacity:1; transform:translateY(0); }
    }
    #chat-popup { display:none; } /* Hidden by default */
</style>

<script src="js/widget-chat.js"></script>
