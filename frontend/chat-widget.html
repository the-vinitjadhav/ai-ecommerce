<div id="ai-chat-widget">
    
    <button id="chat-toggle">🤖</button>

    <div id="chat-popup">
        
        <div class="chat-header">
            <div>
                <span style="font-weight:600; font-size:1.1rem;">🤖 AI Assistant</span>
                <br><small style="opacity:0.8;">Online • Powered by Groq</small>
            </div>
            <button id="chat-close" style="background:none; border:none; color:white; font-size:22px; cursor:pointer;">✕</button>
        </div>

        <div id="widget-chat-messages">
            <div style="text-align:center; color:#888; font-size:0.9rem; padding:20px;">
                👋 Ask me anything about products, prices, or orders!
            </div>
        </div>

        <div class="chat-input-container">
            <input id="widget-chat-input" type="text" placeholder="Ask about products...">
            <button id="widget-chat-send">Send</button>
        </div>
    </div>
</div>

<script src="js/widget-chat.js"></script>
