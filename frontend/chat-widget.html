<!-- frontend/chat-widget.html -->
<div id="ai-chat-widget">
    <button id="chat-toggle" class="chat-toggle-btn"><i class="bi bi-stars"></i></button>

    <div id="chat-popup" class="modern-chat-popup">
        <div class="chat-header">
            <h6 class="mb-0 fw-bold">AI Shopping Assistant</h6>
            <button id="chat-close" class="btn-close"></button>
        </div>
        <div id="widget-chat-messages">
            <div class="bubble bubble-ai">👋 Hello! How can I help you today?</div>
        </div>
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <input id="widget-chat-input" type="text" placeholder="Type a message...">
                <button id="widget-chat-send"><i class="bi bi-send"></i></button>
            </div>
        </div>
    </div>
</div>
