<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 admin-sidebar p-0">
                <div class="p-3">
                    <h5 class="text-white">AI Store Admin</h5>
                </div>
                <a href="dashboard.html">Dashboard</a>
                <a href="add-product.html" class="active">Add Product</a>
                <a href="orders.html">Orders</a>
                <a href="../index.html" class="text-danger">Logout</a>
            </div>
            
            <!-- Main Content -->
            <div class="col-md-10 p-4">
                <h2>Add New Product</h2>
                
                <div class="card mt-4">
                    <div class="card-body">
                        <div id="add-alert" class="alert alert-success d-none"></div>
                        <div id="add-error" class="alert alert-danger d-none"></div>
                        
                        <form id="add-product-form">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="product_name" class="form-label">Product Name *</label>
                                    <input type="text" class="form-control" id="product_name" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="category_name" class="form-label">Category Name *</label>
                                    <input type="text" class="form-control" id="category_name" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" rows="3"></textarea>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="price" class="form-label">Price (₹) *</label>
                                    <input type="number" class="form-control" id="price" step="0.01" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="stock" class="form-label">Stock Quantity *</label>
                                    <input type="number" class="form-control" id="stock" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="image_url" class="form-label">Image URL</label>
                                    <input type="text" class="form-control" id="image_url" placeholder="https://example.com/image.jpg">
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary">Add Product</button>
                            <a href="dashboard.html" class="btn btn-secondary">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
