<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - AI Ecommerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🛒 AI Store</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cart.html">Cart <span id="cart-count" class="badge bg-danger">0</span></a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">Orders</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html" id="login-link">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Your Shopping Cart</h2>
        
        <div id="cart-container">
            <div class="text-center py-5" id="empty-cart">
                <h4>Your cart is empty</h4>
                <a href="products.html" class="btn btn-primary">Continue Shopping</a>
            </div>
            
            <div id="cart-items" style="display: none;">
                <div class="row">
                    <div class="col-md-8">
                        <div id="cart-items-list"></div>
                    </div>
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">Order Summary</h5>
                                <hr>
                                <div class="d-flex justify-content-between">
                                    <span>Total:</span>
                                    <span id="cart-total" class="price">₹0</span>
                                </div>
                                <button class="btn btn-success w-100 mt-3" onclick="checkout()">
                                    Checkout
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js?v=2"></script>
    <script src="js/auth.js?v=2"></script>
    <script src="js/cart.js?v=2"></script>
    <!-- Floating AI Chat Widget -->
<div id="ai-chat-widget-container">
    <script src="js/widget-chat.js"></script>
    <link rel="stylesheet" href="css/widget-chat.css">
</div>
</body>
</html>
